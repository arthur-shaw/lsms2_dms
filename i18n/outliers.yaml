    # {labelled::to_character(.data[[var_chr]])}
    fr: loyer attendu à payer par unité de temps
    # {labelled::to_character(.data[[var_chr]])}
  # actual rent
  hh11_q05:
    en: rent per time unit
    # {labelled::to_character(.data[[var_chr]])}
    fr: loyer par unité de temps
    # {labelled::to_character(.data[[var_chr]])}
