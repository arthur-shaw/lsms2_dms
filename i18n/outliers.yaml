global:
  desc:
    en: "Outlier for {..3}"
    fr: "Valeur extrême pour {..3}"
  comment_intro:
    en: "Outlier identified for {..3}."
    fr: "Valeur extrême identifée pour {..3}."
  comment_var:
    en: "The value of {..1}"
    fr: "La valeur de {..1}"
  comment_body:
    en: >
      ({
        scales::label_number(
          big.mark = ',',
          decimal.mark = '.'
        )(haven::zap_label(.data[[var_chr]]))
        }
      )
      diverges from the norm.
      Please check the accuracy of the value.
      If the value is incorrect, please correct it.
      If the value is confirmed, please leave a comment explaining it.
    fr: >
      ({
        scales::label_number(
          big.mark = ' ',
          decimal.mark = ','
        )(haven::zap_label(.data[[var_chr]]))
        }
      )
      s'écarte de la norme.
      Veuillez vérier la justesse de la valeur.
      Si la valeur est erronnée, veuillez la corriger.
      Si la valeur est confirmée, veuillez laisser un commentaire explicatif.

# ==============================================================================
# household-level
# ==============================================================================

household:

  # --------------------------------------------------------------------------
  # [11] housing
  # --------------------------------------------------------------------------

  # hypothetical rent
  hh11_q04:
